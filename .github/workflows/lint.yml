name: Lint & Format Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  clang-format:
    name: Check Code Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Run clang-format style check
        uses: jidicula/clang-format-action@v4.18.0
        with:
          clang-format-version: "18"
          check-path: "."
          fallback-style: "none"
