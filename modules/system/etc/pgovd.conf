# ==============================================================================
# This file dictates the kernel sysfs tunables and Android system properties
# to be applied by the pgovd upon initialization.
#
# SYNTAX AND PARSING RULES:
# -------------------------
# - Format: <prefix>.<key>=<value>
# - STRICT PARSING: Spaces around the '=' operator are strictly prohibited.
#   (e.g., 'prop.foo=1' is valid; 'prop.foo = 1' will fail to parse).
# - The maximum allowed length per line is 255 characters.
# - Lines beginning with '#' are treated as comments and ignored.
#
# SUPPORTED DIRECTIVES:
# ---------------------
# 1. sysfs.<absolute_path>=<value>
#    Writes the specified <value> directly to the target <absolute_path>.
#    There is no hard limit on the number of sysfs nodes you can define.
#
#    Example:
#    sysfs./proc/sys/kernel/sched_child_runs_first=0
#
# 2. prop.<property_name>=<value>
#    Overrides an Android system property. The daemon internally tracks the
#    original states and will automatically restore them upon a graceful exit.
#    NOTE: There is a hard limit of 64 properties. Any entries exceeding 
#    this limit will be rejected with an -ENOSPC error.
#
#    Example:
#    prop.debug.sf.latch_unsignaled=1
#
# ==============================================================================